<!DOCTYPE html>
<html>
<head>
    <title>Iframe Example</title>

    <style>
        body{
            background-color: lightblue;
            font-family: Arial;
            text-align: center;
        }

        h1{
            color: darkblue;
        }

        iframe{
            border: 3px solid black;
        }

        img{
            border: 3px solid red;
        }
    </style>

</head>
<body>

<h1>10K Coders - Iframe Example</h1>

<h2>Image</h2>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSJDsIScVEKKMKTcB8sX0XrbuBaDDxxhRYMm-Aw1PQrbZxwA5KfKzDPBGFg&s=10"
width="300"
height="180"
alt="10K Coders Image">

<hr>

<h2>Audio</h2>

<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Your browser does not support the audio tag.
</audio>

<hr>

<h2>Video</h2>

<video width="500" controls>
    <source src="video.mp4" type="video/mp4">
    Your browser does not support the video tag.
</video>

<hr>

<h2>10K Coders Website (Iframe)</h2>

<iframe
src="https://www.10000coders.in/"
width="900"
height="500">
</iframe>

</body>
</html>
